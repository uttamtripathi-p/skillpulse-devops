---
apiVersion: v1
kind: Secret
metadata:
  name: skillpulse-db
  namespace: skillpulse
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword123
  MYSQL_DATABASE: skillpulse
  MYSQL_USER: skillpulse
  MYSQL_PASSWORD: skillpulse123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: skillpulse
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS skillpulse;
    USE skillpulse;

    CREATE TABLE IF NOT EXISTS skills (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        category VARCHAR(50) DEFAULT '',
        target_hours INT DEFAULT 0,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS learning_logs (
        id INT AUTO_INCREMENT PRIMARY KEY,
        skill_id INT NOT NULL,
        hours DECIMAL(4,1) NOT NULL,
        notes TEXT,
        log_date DATE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (skill_id) REFERENCES skills(id) ON DELETE CASCADE
    );

    INSERT INTO skills (name, category, target_hours) VALUES
        ('Docker', 'DevOps', 40),
        ('Kubernetes', 'DevOps', 60),
        ('Go', 'Programming', 50),
        ('Azure DevOps', 'Cloud', 30),
        ('Terraform', 'DevOps', 35);

    INSERT INTO learning_logs (skill_id, hours, notes, log_date) VALUES
        (1, 2.0, 'Learned Docker basics - images, containers, volumes', '2026-03-10'),
        (1, 1.5, 'Built multi-stage Dockerfile for Go app', '2026-03-12'),
        (1, 3.0, 'Docker Compose with multiple services', '2026-03-14'),
        (2, 1.0, 'Kubernetes architecture overview', '2026-03-11'),
        (2, 2.0, 'Deployed first pod and service', '2026-03-13'),
        (3, 2.5, 'Go basics - structs, interfaces, goroutines', '2026-03-10'),
        (3, 1.5, 'Built REST API with Gin framework', '2026-03-15'),
        (4, 1.0, 'Created Azure DevOps org and project', '2026-03-16'),
        (5, 1.5, 'Terraform basics - providers, resources, state', '2026-03-17');
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: skillpulse
  labels:
    app: mysql
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: skillpulse
spec:
  serviceName: mysql
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          envFrom:
            - secretRef:
                name: skillpulse-db
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [mysqladmin, ping, -h, localhost]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: init
          configMap:
            name: mysql-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
